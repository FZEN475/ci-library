.template-variables: &template-variables
  variables:
    CHANNEL: release
    KUBE_CONTEXT: dev/kubernetes-agent-config:kubernetes-agent-prod

.template-rules: &template-rules
  if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_REF_PROTECTED == "true"
  <<: *template-variables

Build artifact:
  image:
    name: gradle
    entrypoint: [ "" ]
  cache:
    key: "$CI_PROJECT_ID"
    paths:
      - ./cache/
  script:
    - ls -all ./
    - mkdir -p cache/
    - | 
      if [ -n -z "$( ls -A './cache/' )" ]; then
         cp ./cache/* /home/gradle/.gradle/
      fi
    - echo "123" > /home/gradle/.gradle/test.txt
    - ls -all /home/gradle/.gradle/
#    - gradle buildPlugin
    - cp -r /home/gradle/.gradle/* ./cache/
    - ls -all ./cache/
  artifacts:
    paths:
      - "build/distributions/*.*"

