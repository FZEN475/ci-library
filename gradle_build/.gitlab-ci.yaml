.template-variables: &template-variables
  variables:
    CHANNEL: release
    KUBE_CONTEXT: dev/kubernetes-agent-config:kubernetes-agent-prod

.template-rules: &template-rules
  if: $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_REF_PROTECTED == "true"
  <<: *template-variables

Build artifact:
  image:
    name: gradle
    entrypoint: [ "" ]
  cache:
    key: "$CI_PROJECT_ID"
    paths:
      - ./cache/
  script:
    - gradle buildPlugin -g ./cache/
  artifacts:
    paths:
      - "build/distributions/*.*"
  rules:
    - when: always

push artifact:
  script:
    - >
      curl -v -k --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
      --upload-file $(find ./build/distributions/ -type f -name '*.*')
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${PLUGIN_VERSION}/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}${EXTENCION}"
  needs:
    - "Build artifact"
  rules:
    - when: always

mirror release to github:
  script:
    - >
      id=$(curl -L -X POST
      -H "Accept: application/vnd.github+json"
      -H "Authorization: Bearer $GITHUB_TOKEN"
      -H "X-GitHub-Api-Version: 2022-11-28"
      https://api.github.com/repos/FZEN475/${CI_PROJECT_NAME}/releases
      -d '{"tag_name":"${CI_COMMIT_TAG}","target_commitish":"main","name":"${CI_COMMIT_TAG}",
      "body":"${CI_PROJECT_NAME}-${CI_COMMIT_TAG}${EXTENCION}","draft":false,"prerelease":false,"generate_release_notes":false}' | jq -r  '.id')
    - |
      curl -L \
        -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        -H "Content-Type: application/octet-stream" \
        "https://uploads.github.com/repos/FZEN475/${CI_PROJECT_NAME}/releases/$id/assets?name=README.md" \
        --data-binary "@$(find ./build/distributions/ -type f -name '*.*')"
  needs:
    - "Build artifact"
  allow_failure: true
  rules:
      when: always